<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>財務諸表分析マスター RPG</title>
  <style>
    :root{
      --bg:#060817; --card:rgba(17,26,51,.88); --text:#eef2ff; --muted:#a6b0d6;
      --good:#22c55e; --bad:#ef4444; --warn:#f59e0b; --btn:#263a77; --btn2:#1b2a55;
      --radius:18px;
      /* 勘定科目RPGの色分け思想を移植 */
      --asset-bd:#b7d7ff; --liab-bd:#ffc2c2; --equity-bd:#d2c6ff;
      --exp-bd:#ffd08a; --rev-bd:#b7f0c6; --symbol-bd:#ffffff;
    }

    body{
      margin:0; font-family:system-ui,-apple-system,"Segoe UI",sans-serif; color:var(--text);
      background: linear-gradient(120deg, #0b1020, #1b2a55, #0b1020, #2a1b55);
      background-size: 400% 400%;
      animation: grad 14s ease infinite;
      min-height:100vh;
      overflow-x: hidden;
    }
    @keyframes grad{ 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

    .wrap{ max-width:1180px; margin:0 auto; padding:18px; }
    .card{
      background:var(--card); border-radius:var(--radius); padding:16px; margin:12px 0;
      box-shadow:0 16px 44px rgba(0,0,0,.35); border:1px solid rgba(238,242,255,.10);
      backdrop-filter: blur(6px); position: relative;
    }

    /* 正解・不正解の特大演出 */
    #feedbackOverlay {
      position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
      font-size: 80px; font-weight: 900; z-index: 10; pointer-events: none; border-radius: var(--radius);
    }
    .ani-pop { animation: pop 0.6s ease forwards; }
    @keyframes pop { 0%{transform:scale(0.5); opacity:0;} 50%{transform:scale(1.2); opacity:1;} 100%{transform:scale(1); opacity:0;} }

    .toolbar{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
    .pill{
      display:inline-flex; gap:8px; align-items:center; padding:8px 12px; border-radius:999px;
      background:rgba(15,23,48,.75); border:1px solid rgba(238,242,255,.12);
    }

    /* 進化バー */
    .xpbar{ width:200px; height:12px; border-radius:999px; background:rgba(238,242,255,.12); overflow:hidden; }
    .xpfill{ height:100%; width:0%; background:linear-gradient(90deg, #22c55e, #3b82f6); transition:width .35s; }

    .expr{
      min-height:60px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;
      border:2px dashed rgba(166,176,214,.3); border-radius:14px; padding:12px; margin:15px 0;
    }
    .chip{ background:rgba(15,23,48,.9); border:1px solid rgba(255,255,255,.2); padding:8px 12px; border-radius:12px; }

    /* ボタン色分け：勘定科目RPGのロジック */
    .btn-asset { border: 2px solid var(--asset-bd) !important; color: var(--asset-bd); }
    .btn-liab  { border: 2px solid var(--liab-bd) !important;  color: var(--liab-bd); }
    .btn-exp   { border: 2px solid var(--exp-bd) !important;   color: var(--exp-bd); }
    .btn-rev   { border: 2px solid var(--rev-bd) !important;   color: var(--rev-bd); }
    .btn-sym   { border: 1px solid var(--symbol-bd) !important; color: var(--symbol-bd); opacity: 0.8; }

    button { 
      border:0; border-radius:12px; padding:10px 14px; background:var(--btn); color:var(--text);
      cursor:pointer; font-weight:800; transition: 0.2s;
    }
    button:hover { filter:brightness(1.2); transform: translateY(-2px); }
    
    #playerNameInput { 
      background: #000; color: #fff; border: 2px solid var(--good); padding: 8px; border-radius: 8px; font-weight: bold;
    }
    #playerNameInput:read-only { border-color: #555; color: var(--muted); background: transparent; }

    .modal { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.8); z-index:999; }
    .modal.on { display:flex; }
    .modalCard { background:var(--card); border:1px solid var(--good); padding:24px; border-radius:20px; text-align:center; }
  </style>
</head>
<body>

<div class="modal" id="startModal">
  <div class="modalCard">
    <h3>名前を入力して分析開始</h3>
    <input id="initialName" placeholder="例：3年A組 田中" style="font-size:18px; padding:10px; margin-bottom:15px; width:80%;">
    <br>
    <button onclick="startGame()" style="padding:10px 40px; background:var(--good);">冒険を始める</button>
  </div>
</div>

<div class="wrap">
  <div class="card">
    <div id="feedbackOverlay"></div>
    <div class="toolbar">
      <div>
        <div id="charIcon" style="font-size: 40px;">🥚</div>
        <h2 id="qName">読み込み中...</h2>
        <div class="muted small" id="qMeta">-</div>
      </div>
      <div class="row" style="display:flex; flex-direction:column; align-items:flex-end; gap:8px;">
        <div class="pill">
          <input type="text" id="playerNameInput" readonly>
          <span id="charTitle" class="small" style="margin-left:8px; color:var(--good);">Lv.1 簿記のたまご</span>
        </div>
        <div class="pill">
          <div class="xpbar"><div class="xpfill" id="xpFill"></div></div>
          <div class="muted small" id="xpText" style="margin-left:8px;">0/50</div>
        </div>
        <div class="muted small">正解率: <span id="acc">-</span> (<span id="score">0/0</span>)</div>
      </div>
    </div>

    <div id="expr" class="expr"></div>

    <div style="display:flex; gap:10px;">
      <button onclick="undo()" class="btn2">1つ戻す</button>
      <button onclick="clearExpr()" style="background:#7a2430;">全部消す</button>
      <button onclick="showHint()" class="btn2" style="background:transparent; border:1px solid #555;">答えを見る</button>
      <span style="flex:1"></span>
      <button onclick="nextQuestion()" class="btn2">スキップ</button>
    </div>
    <div id="hintArea" class="muted small" style="margin-top:10px; min-height:1.2em;"></div>
  </div>

  <div class="card">
    <div class="muted" style="margin-bottom:10px;">演算子</div>
    <div id="opsWrap" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px;"></div>
    
    <div class="muted" style="margin-bottom:10px;">財務項目（B/S・P/Lから選択）</div>
    <div id="itemsWrap" style="display:flex; gap:8px; flex-wrap:wrap;"></div>
  </div>
</div>

<script>
  const QUESTIONS = [
    {cat:"収益性", name:"自己資本利益率（ROE）", tokens:["当期純利益","÷","自己資本","×100"], unit:"%"},
    {cat:"安全性", name:"流動比率", tokens:["流動資産","÷","流動負債","×100"], unit:"%"},
    {cat:"安全性", name:"自己資本比率", tokens:["自己資本","÷","総資本","×100"], unit:"%"},
    {cat:"効率性", name:"総資本回転率", tokens:["売上高","÷","総資本"], unit:"回"},
    {cat:"安全性", name:"固定長期適合率", tokens:["固定資産","÷","（","固定負債","＋","自己資本","）","×100"], unit:"%"},
  ];

  const CHARACTERS = [
    { score: 0,    icon: '🥚', name: '分析のたまご' },
    { score: 50,   icon: '🐣', name: '新人アナリスト' },
    { score: 150,  icon: '🐥', name: 'かけだし調査員' },
    { score: 300,  icon: '🦉', name: '財務の賢者' },
    { score: 600,  icon: '🐲', name: '伝説のCFO' }
  ];

  // アイテムの分類定義（色分け用）
  const ITEM_TYPES = {
    "当期純利益":"rev", "売上高":"rev", "売上総利益":"rev",
    "自己資本":"equity", "総資本":"equity",
    "流動資産":"asset", "固定資産":"asset",
    "流動負債":"liab", "固定負債":"liab"
  };

  let state = {
    idx: 0, tokens: [], tries: 0, correct: 0, xp: 0, level: 1, name: ""
  };

  function startGame() {
    const name = document.getElementById('initialName').value.trim();
    if(!name) return alert("名前を入れてね！");
    state.name = name;
    document.getElementById('playerNameInput').value = name;
    document.getElementById('startModal').classList.remove('on');
    localStorage.setItem('analystRPG_name', name);
    initGame();
  }

  function initGame() {
    const savedName = localStorage.getItem('analystRPG_name');
    if(!savedName) {
      document.getElementById('startModal').classList.add('on');
    } else {
      state.name = savedName;
      document.getElementById('playerNameInput').value = savedName;
      renderQuestion();
    }
    buildButtons();
  }

  function buildButtons() {
    const ops = ["＋","－","×","÷","（","）","×100"];
    const opsWrap = document.getElementById('opsWrap');
    ops.forEach(op => {
      const btn = document.createElement('button');
      btn.textContent = op;
      btn.className = "btn-sym";
      btn.onclick = () => addToken(op);
      opsWrap.appendChild(btn);
    });

    const itemSet = new Set();
    QUESTIONS.forEach(q => q.tokens.forEach(t => { if(!ops.includes(t)) itemSet.add(t); }));
    const itemsWrap = document.getElementById('itemsWrap');
    [...itemSet].sort().forEach(item => {
      const btn = document.createElement('button');
      btn.textContent = item;
      const type = ITEM_TYPES[item] || "sym";
      btn.className = `btn-${type}`;
      btn.onclick = () => addToken(item);
      itemsWrap.appendChild(btn);
    });
  }

  function addToken(t) {
    state.tokens.push(t);
    renderExpr();
    checkAnswer();
  }

  function renderExpr() {
    const wrap = document.getElementById('expr');
    wrap.innerHTML = state.tokens.map(t => `<div class="chip">${t}</div>`).join('') || '<span class="muted">ボタンを押して式を組み立てよう</span>';
  }

  function checkAnswer() {
    const q = QUESTIONS[state.idx];
    if(state.tokens.length !== q.tokens.length) return;

    const isCorrect = JSON.stringify(state.tokens) === JSON.stringify(q.tokens);
    state.tries++;
    
    if(isCorrect) {
      state.correct++;
      state.xp += 20;
      showFeedback("⭕ 正解！", "#22c55e");
      setTimeout(nextQuestion, 1000);
    } else {
      showFeedback("❌ 不正解", "#ef4444");
      state.tokens = [];
      setTimeout(renderExpr, 800);
    }
    updateStats();
  }

  function showFeedback(text, color) {
    const el = document.getElementById('feedbackOverlay');
    el.textContent = text;
    el.style.color = color;
    el.style.display = 'flex';
    el.classList.remove('ani-pop');
    void el.offsetWidth; // reflow
    el.classList.add('ani-pop');
    setTimeout(() => { el.style.display = 'none'; }, 800);
  }

  function updateStats() {
    document.getElementById('score').textContent = `${state.correct}/${state.tries}`;
    document.getElementById('acc').textContent = state.tries ? Math.round(state.correct/state.tries*100) + "%" : "-";
    
    // XPとキャラ進化
    let char = CHARACTERS[0];
    CHARACTERS.forEach(c => { if(state.xp >= c.score) char = c; });
    document.getElementById('charIcon').textContent = char.icon;
    document.getElementById('charTitle').textContent = char.name;
    
    const nextChar = CHARACTERS[CHARACTERS.indexOf(char)+1];
    if(nextChar) {
      const progress = ((state.xp - char.score) / (nextChar.score - char.score)) * 100;
      document.getElementById('xpFill').style.width = progress + "%";
      document.getElementById('xpText').textContent = `${state.xp} / ${nextChar.score}`;
    }
  }

  function renderQuestion() {
    const q = QUESTIONS[state.idx];
    document.getElementById('qName').textContent = q.name;
    document.getElementById('qMeta').textContent = `分類：${q.cat} | 単位：${q.unit} | 担当：${state.name}`;
    state.tokens = [];
    document.getElementById('hintArea').textContent = "";
    renderExpr();
  }

  function nextQuestion() {
    state.idx = (state.idx + 1) % QUESTIONS.length;
    renderQuestion();
  }

  function undo() { state.tokens.pop(); renderExpr(); }
  function clearExpr() { state.tokens = []; renderExpr(); }
  function showHint() { 
    document.getElementById('hintArea').textContent = "正解： " + QUESTIONS[state.idx].tokens.join(" "); 
  }

  initGame();
</script>
</body>
</html>
